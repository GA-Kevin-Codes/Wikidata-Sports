name: NBA

on:
  workflow_dispatch:
    inputs:
      date:
        description: Optional local game date in YYYY-MM-DD
        required: false
        type: string
      dry_run:
        description: Run without writing to Wikidata
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 20-23,0-4 * 10-12,1-6 *'
      timezone: 'America/New_York'

permissions:
  contents: read

concurrency:
  group: nba-nightly
  cancel-in-progress: false

jobs:
  update-finals:
    environment: NBA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore updater caches
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/nba_final_wikidata/lookups
            .cache/nba_final_wikidata/session
          key: nba-wikidata-sports-${{ github.run_id }}
          restore-keys: |
            nba-wikidata-sports-

      - name: Run final updater
        env:
          WIKIDATA_USERNAME: ${{ secrets.WIKIDATA_USERNAME }}
          WIKIDATA_PASSWORD: ${{ secrets.WIKIDATA_PASSWORD }}
          WIKIDATA_WRITE_MAXLAG_SECONDS: '60'
          INPUT_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || '' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          cmd=(python3 NBA_Nightly.py --verbose)
          if [ -n "$INPUT_DATE" ]; then
            cmd+=(--date "$INPUT_DATE")
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            cmd+=(--dry-run)
          fi
          "${cmd[@]}"

      - name: Save updater caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/nba_final_wikidata/lookups
            .cache/nba_final_wikidata/session
          key: nba-wikidata-sports-${{ github.run_id }}
